name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore src/WinOptimizer.AI.csproj

    - name: Build
      run: dotnet build src/WinOptimizer.AI.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish src/WinOptimizer.AI.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinOptimizer.AI-Build
        path: ./publish

  release:
    needs: build
    # On déclenche si c'est un tag OU un push sur main pour être sûr que tu aies ta release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: WinOptimizer.AI-Build
        path: ./release_files

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./release_files/*.exe
        generate_release_notes: true
        # Permet d'écraser la release si tu pousses le même tag plusieurs fois pendant tes tests
        make_latest: true